<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

      content="Fast, accurate real-time weather, hourly and 7-day forecasts for any city. Free and mobile-friendly."

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- Structured data: WebApplication + Organization -->
    <script type="application/ld+json">

            "browserRequirements": "Requires JavaScript and a modern browser",

          {
            "@type": "Organization",
            "name": "Wethr AI",
            "url": "https://weather-app-4d783.web.app/",

          },
          {
            "@type": "WebSite",
            "url": "https://weather-app-4d783.web.app/",
            "name": "Wethr AI",
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://weather-app-4d783.web.app/?q={search_term_string}",
              "query-input": "required name=search_term_string"
            }

        ]
